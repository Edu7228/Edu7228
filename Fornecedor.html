<!DOCTYPE html>
<HTML lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário do Fornecedor</title>
    <link rel="stylesheet" href="../css/Fornecedor.css">
</head> 
    <Body>
        <br>
        <H1
            id="Titulo">
            Formulário do Fornecedor.
        </H1>
        <br>
<div id="Total">
    
        <fieldset 
            class="Frame"
            id="FrmFornecedor"
            disabled>

            <legend Class="Legenda">
                Dados do fornecedor.
            </legend>

                <label 
                    class = "Componente">
                    Código do fornecedor ....... 
                </label>

                <label 
                    class="Componente"
                    id="LblCodFornecedor"> 
                    6238 
                </label>
                <br>

                <label
                    class = "Componente">
                    Razão Social................
                </label>

                <input 
                    type="text"
                    class = "Componente"
                    id="TxtRazaoSocial"
                >
                <br>

                <label 
                    class="Componente">
                    País de origem..............
                </label>

                <input 
                    type="text"
                    class = "Componente"
                    id="TxtPaisOrigem"
                >
                <br>
        </fieldset>
    

        <fieldset
            class="Frame"
            id="Lista">
            <Legend class="Legenda">Lista de Fornecedores.</Legend>
            <br>
            <select
                class = "Componente"
                id = "LstFornecedor">
            </select>
        </fieldset>
        <br><br>



        <fieldset
            class="Frame"
            id="Button">
            <legend class="Legenda">
                Caixa de Comandos
            </legend>
            <button
                class = "Button"
                id="BtnNovoCadastro">
                Novo Cadastro.
            </button>            

            <button
                Class = "Button"
                id = "BtnCadastrar"
                disabled>
                Cadastrar.
            </button>

            <button
                class = "Button"
                id = "BtnExcluir"
                disabled>
                Excluir.
            </button>
            <br>
            
            <button
                class = "Button"
                id = "BtnAtualizar"
                disabled>
                Atualizar.
            </button>

            <button
                class = "Button"
                id = "BtnJanelaEndereco"
                disabled>
                Abrir janela de endereço.
            </button>
        </fieldset>
        <br>

        <fieldset
            class="Frame"
            id="FrmEndereco"
            disabled>
            <legend class="Legenda">Informações do Endereço.</legend>
            <label
                class="Componente">
                Código do endereço........
            </label>

            <label
                class="Componente"
                id="LblCodEndereco">
            </label>
            <br>

            <label 
                class="Componente">
                País Residente...........
            </label>

            <input 
                type="text"
                class="Componente"
                id="TxtPaisResidente">
            <br>

            <label
                class="Componente">
                Estado...................
            </label>

            <input 
                type="text"
                class="Componente"
                id="TxtEstado">
            <br>
            
            <label
                class="Componente">
                Bairro...................
            </label>

            <input 
                type="text"
                class="Componente"
                id="TxtBairro">
            <br>
            
            <label 
                class="Componente">
                Rua......................
            </label>

            <input 
                type="text"
                class="Componente"
                id="TxtRua">
            <br>
            
            <label
                class="Componente">
                Número...................
            </label>
            
            <input 
                type="text"
                class="Componente"
                id="TxtNumero">
            <br>

            <label
                class="Componente">
                Complementos.............
            </label>
            
            <textarea
                class="Componente"
                id="TxtComentario">
            </textarea>
            
            <br><br>

            <button
                class="Button"
                id="BtnCadastrarEndereco">
                Cadastrar Endereço.
            </button>

            <button
                class="Button"
                id="BtnAtualizar">
                Atualizar Endereço.
            </button>
            <br>

            <button
                class="Button"
                id="BtnFechar">
                Fechar a janela de Endereço.
            </button>
            <br>
        </fieldset>
</div>

<!-- ====================================================================== -->
<!-- Acionar a bibliotéca para a caixa de mensagem mais elaborada. -->
<!-- ====================================================================== --> 
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- ====================================================================== -->

<script src="../javascript/Fornecedor.js"></script>

</Body>
</HTML>

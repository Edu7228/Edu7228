
<!DOCTYPE html>
<HTML lang="pt-br">
<head>
        <meta charset="UTF-8">
        <title>Formulário do Cliente.</title>
        <link rel="stylesheet" href="../css/Cliente.css">

</head>
<body>
    <br>
    <h1>Formulário do Cliente.</h1>
    <br>
    
    <fieldset
        class="Frame">
        <legend>Dados do Cliente.</legend>
        <br>

        <label
            class="Componente">
            Código do Cliente.......
        </label>

        <label
            class="Componente"
            id="LblCodCliente">
        </label>
        <br>

        <label
            class="label">
            Documento................
        </label>

        <input
            type="text"
            class="Componente"
            id="TxtDocumento">
        <br>
        
        <label
            class="Componente">
            Nome do Cliente....... 
        </label>

        <input 
            type="text"
            class="Componente"
            id="TxtNomeCliente">
        <br>
        
        <label
            class="label">
            Idade Cliente............. 
        </label>

        <input 
            type="text"
            class="Componente"
            id="TxtIdade">
        <br>    
    </fieldset>

            <fieldset
            class="Frame">
            Listar Cliente.
            <br>
            <select
                class = "Componente"
                id = "LstCliente">
            </select>
        </fieldset>

    <fieldset
        class="Frame">
        <legend>Caixa de Comandos</legend>
        <br>
        <button
            class="Button"
            id="BtnNovoCadastro">
            Novo Cadastro.
        </button>

        <button
            class="button"
            id="BtnCadastrar">
            Cadastrar.
        </button>

        <button
            class="Button"
            id="BtnExcluir">
            Excluir.
        </button>
        <br>
        
        <button
            class="Button"
            id="BtnAtualizar">
            Atualizar.
        </button>
        
        <button
            class="Button"
            id="Componente">
            Abrir Janela Endereço.
        </button>
    </fieldset>
    <br>

           <fieldset
            class="Frame"
            id="FrmEndereco">
            <legend>Informações do Endereço.</legend>
            <label
                class="Componente">
                Código do endereço........
            </label>

            <label
                class="Componente"
                id="LblCodEndereco">
            </label>
            <br>

            <label 
                class="Componente">
                País Residente..............
            </label>

            <input 
                type="text"
                class="Componente"
                id="TxtPaisResidente">
            <br>

            <label
                class="Componente">
                Estado..........................
            </label>

            <input 
                type="text"
                class="Componente"
                id="TxtEstado">
            <br>
            
            <label
                class="Componente">
                Bairro...........................
            </label>

            <input 
                type="text"
                class="Componente"
                id="TxtBairro">
            <br>
            
            <label 
                class="Componente">
                Rua...............................
            </label>

            <input 
                type="text"
                class="Componente"
                id="TxtRua">
            <br>
            
            <label
                class="Componente">
                Número........................
            </label>
            
            <input 
                type="text"
                class="Componente"
                id="TxtNumero">
            <br>

            <label
                class="Componente">
                Complementos.............
            </label>
            
            <input 
                type="text"
                class="Componente"
                id="TxtComplemento">
            <br><br>

            <button
                class="Button"
                id="BtnCadastrarEndereco">
                Cadastrar Endereço.
            </button>

            <button
                class="Button"
                id="BtnAtualizar">
                Atualizar Endereço.
            </button>
            <br>

            <button
                class="Button"
                id="BtnFechar">
                Fechar a janela de Endereço.
            </button>
            <br>
        </fieldset>
</body>
</html>
